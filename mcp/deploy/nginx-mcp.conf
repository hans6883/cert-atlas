# nginx reverse-proxy for the remote MCP endpoint, with per-IP rate limiting.
# Drop into /etc/nginx/conf.d/cert-atlas-mcp.conf (loaded at http scope), then:
#   sudo systemctl reload nginx
# Adjust the listen IP and ssl_certificate paths to your host. If you front this
# with Cloudflare, also lock the origin to Cloudflare (see deploy/README.md).

limit_req_zone $binary_remote_addr zone=certatlasmcp:10m rate=20r/s;

# Shared proxy settings (streaming-friendly for Streamable HTTP / SSE).
# proxy_buffering off + HTTP/1.1 are required.
server {
    listen 80;
    server_name mcp.quizforge.ai;
    location / {
        limit_req zone=certatlasmcp burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
server {
    listen 443 ssl;
    server_name mcp.quizforge.ai;
    ssl_certificate     /etc/pki/tls/certs/quizforge.ai.bundle;
    ssl_certificate_key /etc/pki/tls/private/quizforge.ai.key;
    location / {
        limit_req zone=certatlasmcp burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
