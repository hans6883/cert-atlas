<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:640px; overflow:hidden; }
  .cover {
    width:1280px; height:640px; position:relative;
    background: linear-gradient(135deg, #0B1F3A 0%, #14245E 55%, #1E2A78 100%);
    font-family:'Poppins','Segoe UI',sans-serif; color:#fff; overflow:hidden;
  }
  /* faint blueprint grid */
  .grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:48px 48px;
    mask-image: radial-gradient(ellipse at 70% 50%, #000 30%, transparent 80%);
  }
  /* watermark vendor codes */
  .wm {
    position:absolute; right:40px; top:0; bottom:0; width:520px;
    display:flex; flex-direction:column; justify-content:center; gap:18px;
    font-family:'JetBrains Mono','Consolas',monospace; font-size:30px; font-weight:500;
    color:rgba(45,212,191,.10); line-height:1.25; text-align:right;
    transform:rotate(-4deg); user-select:none; white-space:nowrap;
  }
  .content { position:absolute; left:72px; top:0; bottom:0; width:760px;
    display:flex; flex-direction:column; justify-content:center; }
  .eyebrow {
    font-family:'JetBrains Mono','Consolas',monospace; font-size:18px; font-weight:500;
    letter-spacing:3px; color:rgba(255,255,255,.62); margin-bottom:22px;
  }
  h1 { font-size:118px; font-weight:800; line-height:.98; letter-spacing:-2px; }
  .accent { color:#2DD4BF; }
  .sub { font-size:31px; font-weight:600; color:rgba(255,255,255,.86);
    margin-top:18px; max-width:680px; line-height:1.25; }
  .chips { display:flex; gap:16px; margin-top:38px; }
  .chip {
    font-family:'JetBrains Mono','Consolas',monospace; font-size:20px; font-weight:500;
    padding:11px 22px; border:1.5px solid rgba(45,212,191,.65);
    border-radius:999px; color:#CFFAF4; background:rgba(45,212,191,.07);
    white-space:nowrap;
  }
  .url {
    position:absolute; left:72px; bottom:46px;
    font-family:'JetBrains Mono','Consolas',monospace; font-size:23px; font-weight:500;
    color:rgba(255,255,255,.78);
  }
  .badge {
    position:absolute; right:48px; bottom:46px;
    font-family:'JetBrains Mono','Consolas',monospace; font-size:18px; font-weight:500;
    letter-spacing:2px; color:rgba(255,255,255,.5);
  }
</style>
</head>
<body>
  <div class="cover">
    <div class="grid"></div>
    <div class="wm">AWS<br>CompTIA<br>NCLEX<br>CFA&nbsp;Institute<br>PMP<br>CKA<br>Azure<br>CISSP</div>
    <div class="content">
      <div class="eyebrow">OPEN&nbsp;DATASET&nbsp;&middot;&nbsp;MIT&nbsp;&middot;&nbsp;JSON</div>
      <h1>Cert&nbsp;<span class="accent">Atlas</span></h1>
      <div class="sub">The open index of certification exam blueprints</div>
      <div class="chips">
        <div class="chip">1,562&nbsp;exams</div>
        <div class="chip">217&nbsp;bodies</div>
        <div class="chip">domains&nbsp;+&nbsp;weights</div>
        <div class="chip">MIT</div>
      </div>
    </div>
    <div class="url">atlas.quizforge.ai</div>
    <div class="badge">QUIZFORGE.AI</div>
  </div>
</body>
</html>
